# nginx vhost for the playground API (canonical source).
#
# Provisioning (one-time, on vps1):
#
#   sudo install -m 0644 /opt/achronyme-web/deploy/nginx/play.achrony.me.conf \
#         /etc/nginx/conf.d/play.achrony.me.conf
#   sudo certbot --nginx -d play.achrony.me \
#         --redirect --non-interactive --agree-tos -m ops@achrony.me
#   sudo nginx -t && sudo systemctl reload nginx
#
# Update flow: edit this file, commit, then on vps1:
#
#   sudo cp /opt/achronyme-web/deploy/nginx/play.achrony.me.conf \
#           /etc/nginx/conf.d/play.achrony.me.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: point play.achrony.me A/AAAA records at vps1 before running
# certbot — the HTTP-01 challenge fails otherwise.

# HTTP → HTTPS redirect. certbot rewrites the listen blocks below to
# inject the cert paths and a 301 here; preserve the layout it expects.
server {
    listen 80;
    listen [::]:80;
    server_name play.achrony.me;

    # ACME challenge passthrough lives in certbot's webroot snippet —
    # certbot --nginx handles this automatically.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name play.achrony.me;

    # Cert paths added by `certbot --nginx`. Pinned here for clarity.
    ssl_certificate     /etc/letsencrypt/live/play.achrony.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.achrony.me/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/play.achrony.me/chain.pem;

    # Modern config from Mozilla SSL guidelines (intermediate profile).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (Let's Encrypt provides the chain).
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ── Body cap ────────────────────────────────────────────────────
    # ach-server's largest endpoint is /api/fs/write at 256 KB. 1 MB
    # gives headroom without enabling abuse — anything bigger is
    # rejected upstream by the per-route DefaultBodyLimit.
    client_max_body_size 1m;
    client_body_timeout 30s;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # ── Proxy to ach-server ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # Forward enough of the original request that ach-server's
        # SmartIpKeyExtractor picks the real client IP for rate
        # limiting and that CORS / Host-based logic sees correct values.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Heaviest endpoint (/api/circuit, /api/prove) is gated server-side
        # at 30s; the global TimeoutLayer is 35s. 60s here gives the
        # response time to drain on a saturated CPU without nginx
        # cutting it short.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # No buffering — JSON responses are small, and disabling buffering
        # keeps streaming proxies (when added later) honest.
        proxy_buffering off;
        proxy_request_buffering on;
    }
}
