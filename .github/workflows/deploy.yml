name: Deploy

on:
  push:
    branches: [main]

jobs:
  frontend:
    name: Deploy Frontend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=achronyme-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  server:
    name: Deploy ach-server
    runs-on: self-hosted
    steps:
      - name: Build and restart
        run: |
          cd /opt/achronyme-web
          git pull
          source ~/.cargo/env
          cd server
          cargo build --release
          sudo systemctl restart ach-server
